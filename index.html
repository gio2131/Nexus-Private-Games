<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gio's private games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .game-card:hover { transform: translateY(-8px); border-color: rgba(16, 185, 129, 0.5); }
        iframe { background: #000; }
    </style>
</head>
<body class="bg-[#0a0a0c] text-zinc-100 min-h-screen">
    <div id="theme-bg-overlay" class="fixed inset-0 -z-10 transition-all duration-1000 bg-[#0a0a0c]"></div>
    <div id="app">
        <!-- Header -->
        <header id="main-header" class="sticky top-0 z-40 bg-[#0a0a0c]/80 backdrop-blur-xl border-b border-white/5 transition-all duration-1000">
            <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
                <div class="flex items-center gap-2 cursor-pointer group" id="logo">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20 group-hover:scale-110 transition-transform overflow-hidden">
                        <img src="https://i.pinimg.com/736x/70/e8/c7/70e8c7e68e345d467881e85db2e9ec26.jpg" alt="Logo" class="w-full h-full object-cover" referrerpolicy="no-referrer">
                    </div>
                    <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-red-500 to-blue-500 bg-clip-text text-transparent uppercase">
                        Gio's private games
                    </span>
                </div>

                <div class="flex-1 max-w-md relative group">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 group-focus-within:text-emerald-500 transition-colors"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
                    <input
                        type="text"
                        id="search-input"
                        placeholder="Search unblocked games..."
                        class="w-full bg-white/5 border border-white/10 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all placeholder:text-zinc-600"
                    />
                </div>

                <div id="nav-container" class="hidden sm:flex items-center gap-6 text-sm font-medium text-zinc-400 transition-colors duration-1000">
                    <button class="hover:text-white transition-colors" id="nav-games">Games</button>
                    <button class="hover:text-white transition-colors" id="nav-chat">Live Chat</button>
                    <button class="hover:text-white transition-colors" id="nav-others">Others</button>
                    <button class="hover:text-white transition-colors" id="nav-video">Video Player</button>
                    <button class="hover:text-white transition-colors" id="nav-themes">UI Themes</button>
                    <button class="hover:text-white transition-colors" id="nav-suggest">Suggest New Games</button>
                    <button class="hover:text-white transition-colors" id="nav-trusted">Trusted Access</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-8" id="main-content">
            <!-- Content injected by JS -->
        </main>

        <!-- Global Announcement Popup -->
        <div id="announcement-container" class="fixed top-20 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
            <!-- Announcements will be injected here -->
        </div>

        <!-- Jumpscare Overlay -->
        <div id="jumpscare-overlay" class="fixed inset-0 z-[1000] hidden pointer-events-none">
            <img 
                id="jumpscare-img"
                src="https://vignette.wikia.nocookie.net/freddy-fazbears-pizza/images/a/a8/Withered_Foxy_Jumpscare.gif/revision/latest?cb=20170210205114&path-prefix=pl" 
                class="w-full h-full object-cover"
                alt="Jumpscare"
            />
        </div>

        <!-- Entry Login Overlay -->
        <div id="entry-login-overlay" class="fixed inset-0 z-[999] bg-black flex items-center justify-center p-4 hidden">
            <div class="bg-zinc-900 border border-white/10 rounded-3xl p-8 max-w-md w-full shadow-2xl text-center">
                <h2 class="text-3xl font-bold mb-4 bg-gradient-to-r from-red-500 to-blue-500 bg-clip-text text-transparent uppercase">Welcome to Nexus Games</h2>
                <p class="text-zinc-500 mb-8">Please enter your name to continue</p>
                <input 
                    type="text" 
                    id="entry-name-input"
                    class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-xl focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all mb-6 text-center"
                    placeholder="Your Name"
                    maxlength="20"
                />
                <button 
                    id="entry-login-btn"
                    class="w-full bg-emerald-500 hover:bg-emerald-600 text-black font-bold py-4 rounded-2xl text-xl transition-all shadow-lg shadow-emerald-500/20 active:scale-95"
                >
                    Enter Site
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
