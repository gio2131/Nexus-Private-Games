<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gio's private games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .game-card:hover { transform: translateY(-8px); border-color: rgba(16, 185, 129, 0.5); }
        iframe { background: #000; }
    </style>
</head>
<body class="bg-[#0a0a0c] text-zinc-100 min-h-screen">
    <div id="app">
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-[#0a0a0c]/80 backdrop-blur-xl border-b border-white/5">
            <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
                <div class="flex items-center gap-2 cursor-pointer group" id="logo">
                    <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20 group-hover:scale-110 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-black"><line x1="6" x2="10" y1="12" y2="12"></line><line x1="8" x2="8" y1="10" y2="14"></line><line x1="15" x2="15.01" y1="13" y2="13"></line><line x1="18" x2="18.01" y1="11" y2="11"></line><rect width="20" height="12" x="2" y="6" rx="2"></rect></svg>
                    </div>
                    <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-white to-zinc-500 bg-clip-text text-transparent uppercase">
                        Gio's private games
                    </span>
                </div>

                <div class="flex-1 max-w-md relative group">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 group-focus-within:text-emerald-500 transition-colors"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
                    <input
                        type="text"
                        id="search-input"
                        placeholder="Search unblocked games..."
                        class="w-full bg-white/5 border border-white/10 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all placeholder:text-zinc-600"
                    />
                </div>

                <div class="hidden sm:flex items-center gap-6 text-sm font-medium text-zinc-400">
                    <button class="hover:text-white transition-colors" id="nav-games">Games</button>
                    <button class="hover:text-white transition-colors" id="nav-chat">Live Chat</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-8" id="main-content">
            <!-- Content injected by JS -->
        </main>

        <!-- Footer -->
        <footer class="mt-20 border-t border-white/5 py-12 bg-black/50">
            <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-8">
                <div class="flex items-center gap-2 opacity-50">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" x2="10" y1="12" y2="12"></line><line x1="8" x2="8" y1="10" y2="14"></line><line x1="15" x2="15.01" y1="13" y2="13"></line><line x1="18" x2="18.01" y1="11" y2="11"></line><rect width="20" height="12" x="2" y="6" rx="2"></rect></svg>
                    <span class="font-bold tracking-tight uppercase">Gio's private games</span>
                </div>
                <div class="flex gap-8 text-sm text-zinc-500">
                    <a href="#" class="hover:text-white transition-colors">Privacy</a>
                    <a href="#" class="hover:text-white transition-colors">Terms</a>
                </div>
                <div class="text-sm text-zinc-600">
                    © 2026 Gio's private games.
                </div>
            </div>
        </footer>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
