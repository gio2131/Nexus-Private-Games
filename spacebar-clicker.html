<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>SPACEBAR CLICKER</title>

            background-color: #e9e9e1;
            background-image: url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAM9aVRYdFhNTDpjb20uYWRvYmUueG1wAAAAAAA8P3hwYWNrZXQgYmVnaW49Iu+7vyIgaWQ9Ilc1TTBNcENlaGlIenJlU3pOVGN6a2M5ZCI/Pg0KPHg6eG1wbWV0YSB4bWxuczp4PSJhZG9iZTpuczptZXRhLyIgeDp4bXB0az0iQWRvYmUgWE1QIENvcmUgNS4zLWMwMTEgNjYuMTQ1NjYxLCAyMDEyLzAyLzA2LTE0OjU2OjI3ICAgICAgICAiPg0KICA8cmRmOlJERiB4bWxuczp4PSJhZG9iZTpuczptZXRhLyIgeDp4bXB0az0iQWRvYmUgWE1QIENvcmUgNS4zLWMwMTEgNjYuMTQ1NjYxLCAyMDEyLzAyLzA2LTE0OjU2OjI3ICAgICAgICAiPg0KICA8cmRmOlJERiB4bWxuczpyZGY9Imh0dHA6Ly93d3cudzMub3JnLzE5OTkvMDIvMjItcmRmLXN5bnRheC1ucyMiPg0KICAgIDxyZGY6RGVzY3JpcHRpb24gcmRmOmFib3V0PSIiIHhtbG5zOnhtcD0iaHR0cDovL25zLmFkb2JlLmNvbS94YXAvMS4wLyIgeG1sbnM6eG1wTU09Imh0dHA6Ly9ucy5hZG9iZS5jb20veGFwLzEuMC9tbS8iIHhtbG5zOnN0UmVmPSJodHRwOi8vbnMuYWRvYmUuY29tL3hhcC8xLjAvc1R5cGUvUmVzb3VyY2VSZWYjIiB4bXA6Q3JlYXRvclRvb2w9IkFkb2JlIFBob3Rvc2hvcCBDUzYgKFdpbmRvd3MpIiB4bXBNTTpJbnN0YW5jZUlEPSJ4bXAuaWlkOjM4NEI3Q0MyOEExNDExRTdBNjA0RTNCMTA0QkQ4NTU3IiB4bXBNTTpEb2N1bWVudElEPSJ4bXAuZGlkOjM4NEI3Q0MzOEExNDExRTdBNjA0RTNCMTA0QkQ4NTU3Ij4NCiAgICAgIDx4bXBNTTpEZXJpdmVkRnJvbSBzdFJlZjppbnN0YW5jZUlEPSJ4bXAuaWlkOjM4NEI3Q0MwOEExNDExRTdBNjA0RTNCMTA0QkQ4NTU3IiBzdFJlZjpkb2N1bWVudElEPSJ4bXAuZGlkOjM4NEI3Q0MxOEExNDExRTdBNjA0RTNCMTA0QkQ4NTU3IiAvPg0KICAgIDwvcmRmOkRlc2NyaXB0aW9uPg0KICA8L3JkZjpSREY+DQo8L3g6eG1wbWV0YT4NCjw/eHBhY2tldCBlbmQ9InIiPz7DjRUZAAAAOElEQVQ4T2O8d+8eAyWACUqTDahrwKePH/+DMJRLFKCuC/j4+RlBGMolCgyyQCQHjBowDAxgYAAAieQKuj4KC0oAAAAASUVORK5CYII=);
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
        .hide { display: none !important; }
        .spacebar {
            display: inline !important;
            background: #eff2dd;
            background: linear-gradient(180deg, #eff2dd 0, #b1b495 100%);
            border: 2px solid #483d21;
            border-bottom-width: 5px;
            color: #483d21;
            border-radius: 4px;
            padding: 0;
            padding-right: 30px;
            margin-right: 5px;
        }
        #game {
            max-width: 1000px;
            margin: auto;
            overflow: hidden;
            padding-bottom: 50px;
        }
        #counter {
            text-align: center;
            font-size: 8rem;
            color: #483d21;
            height: 8rem;
            font-weight: 700;
            margin-top: 20px;
        }
        #counter span { display: block; text-align: center; }
        #per_second { font-size: 1.5rem; text-align: center; margin-bottom: 1rem; color: #483d21; }
        .sbs {
            display: block;
            font-size: 1.2rem;
            color: #fff;
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 15px;
            padding-top: 40px;
            padding-bottom: 10px;
            cursor: pointer;
        }
        .sb1 {
            border: 5px solid #483d21;
            border-bottom-width: 25px;
            color: #8a7d5a;
            border-radius: 15px;
            transition: transform 80ms ease-in;
            background: #eff2dd;
            background: linear-gradient(180deg, #eff2dd 0, #b1b495 100%);
        }
        .sb1:hover { transition: transform 80ms ease-in; color: #483d21; }
        .sb1:active, .sb_active {
            border-color: #483d21;
            border-bottom-width: 15px;
            padding-top: 50px;
            transform: scaleX(90%) scaleY(90%);
            transition: transform 10ms ease-in;
        }
        #items {
            margin-bottom: 0;
            list-style: none;
            margin-top: 1rem;
            padding: 10px;
            overflow-y: auto;
        }
        .item {
            display: block;
            border: 1px solid #483d21;
            border-radius: 5px;
            margin-bottom: 15px;
            padding: 15px;
            opacity: .5;
            background-color: #e9e9e1;
            cursor: pointer;
        }
        .item_buyable {
            opacity: 1;
            background: #fcffe5;
            background: linear-gradient(180deg, #fcffe5 0, #e5e8d1 100%);
        }
        .item_buyable:hover {
            background: #feffdb;
            background: linear-gradient(180deg, #feffdb 0, #f9fbb2 100%);
        }
        .ititle { font-size: 1.5rem; margin: 0; }
        .idesc { font-size: 1rem; display: block; margin-top: 5px; }
        .cost { margin-top: 15px; font-weight: bold; }
        .ilvl { font-size: 3rem; float: right; margin-top: -10px; }
        ._ilvl { font-size: 1rem; }
        .particle { position: absolute; pointer-events: none; z-index: 100; font-weight: bold; color: #483d21; }
        .spacebar_particle { position: absolute; pointer-events: none; z-index: -1; width: 5px; height: 15px; background: #b1b495; border: 1px solid #483d21; }
        
        /* Back button */
        .back-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            background: #483d21;
            color: #f9fbb2;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            z-index: 100;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='index.html'">Back to Nexus Games</button>
    <div id="game">
        <div id="header">
            <div id="counter"><span>0</span></div>
            <div id="per_second">per second: 0.000</div>
            <div class="sbc">
                <div id="sb" class="sbs sb1">SPACEBAR</div>
            </div>
        </div>
        <ul id="items">
            <!-- Items will be injected here -->
        </ul>
    </div>

    <template id="it">
        <li class="item">
            <span class="ilvl"><span class="_ilvl">x</span>%4</span>
            <h1 class="ititle">%1</h1>
            <span class="idesc">%2</span>
            <div class="cost"><span class="spacebar"></span><span class="icost">%3</span></div>
        </li>
    </template>

    <script>
        const gId = e => document.getElementById(e);
        const nfmt = e => Math.floor(e).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        const nfmt1 = e => e.toFixed(3).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        const nfmt2 = e => {
            if (e < 1e6) return nfmt(e);
            const formats = ["M", "B", "T", "Q", "Qui", "S", "Sp"];
            let t = 1e6;
            for (let n in formats) {
                if (e < (t *= 1e3)) return nfmt1(e / (t / 1e3)) + formats[n];
            }
            return nfmt1(e / (t / 1e3)) + "!";
        };

        let ITEMS = [
            { name: "Monkey", description: "A monkey to help you press space. It succeeds every %v seconds.", cost: 30, initial_value: 0.2, lvl: 0, cost_func: e => 1.1 * e, value_func: e => e, getDescription: e => e.description.replace("%v", 1 / e.initial_value) },
            { name: "Boomer Mom", description: "A boomer mom who can barely open Word. Every mom can press it %vx a second!", cost: 120, initial_value: 3, lvl: 0, cost_func: e => 1.3 * e, value_func: e => 1 * e, getDescription: e => e.description.replace("%v", nfmt(e.initial_value)) },
            { name: "Gen Z Kid", description: "A Gen Z kid. They're good at scrolling, so they do it %vx a second!", cost: 500, initial_value: 20, lvl: 0, cost_func: e => 1.4 * e, value_func: e => 1 * e, getDescription: e => e.description.replace("%v", nfmt(e.initial_value)) },
            { name: "Keyboard Upgrade", description: "Every upgrade will DOUBLE your own hits.", cost: 6000, multiplier: 2, lvl: 0, cost_func: e => 3.5 * e, getDescription: e => e.description },
            { name: "Angry Influencer", description: "Angry influencer bashing their head. Gives %vx per second.", cost: 10000, initial_value: 150, lvl: 0, cost_func: e => 1.5 * e, value_func: e => 1.2 * e, getDescription: e => e.description.replace("%v", nfmt(e.initial_value)) },
            { name: "MOBA Gamer", description: "MOBA gamers are fast. New gamer will hit it %vx per second.", cost: 200000, initial_value: 600, lvl: 0, cost_func: e => 1.4 * e, value_func: e => 1.25 * e, getDescription: e => e.description.replace("%v", nfmt(e.initial_value)) },
            { name: "Homemade Pressing Robot", description: "Impressive rate of %vx per second!", cost: 800000, initial_value: 3500, lvl: 0, cost_func: e => 1.4 * e, value_func: e => 1.25 * e, getDescription: e => e.description.replace("%v", nfmt(e.initial_value)) },
            { name: "Laser Machine Gun", description: "Laser blasts at a rate of %vx per second!", cost: 2000000, initial_value: 25000, lvl: 0, cost_func: e => 1.4 * e, value_func: e => 1.3 * e, getDescription: e => e.description.replace("%v", nfmt(e.initial_value)) },
            { name: "Nuclear Blast Gun", description: "Pretty high at %vx per second!", cost: 10000000, initial_value: 100000, lvl: 0, cost_func: e => 1.4 * e, value_func: e => 1.3 * e, getDescription: e => e.description.replace("%v", nfmt(e.initial_value)) },
            { name: "Alien Tech Machine", description: "Rate is pretty high at %vx per second!", cost: 80000000, initial_value: 1000000, lvl: 0, cost_func: e => 1.4 * e, value_func: e => 1.3 * e, getDescription: e => e.description.replace("%v", nfmt(e.initial_value)) }
        ];

        class Game {
            constructor() {
                this.v = 0;
                this.va = 0;
                this.multiplier = 1;
                this.canclick = true;
                this.frameCounter = 0;
            }

            init() {
                this.cc = gId("counter");
                this.cs = gId("per_second");
                this.sb = gId("sb");
                this.item_container = gId("items");
                this.template = gId("it");

                this.sb.addEventListener("mousedown", (e) => this.click(e));
                document.addEventListener("keydown", (e) => {
                    if (e.code === "Space" && this.canclick) {
                        this.click();
                        this.sb.classList.add("sb_active");
                        this.canclick = false;
                    }
                });
                document.addEventListener("keyup", (e) => {
                    if (e.code === "Space") {
                        this.sb.classList.remove("sb_active");
                        this.canclick = true;
                    }
                });

                for (let i of ITEMS) {
                    const html = this.template.innerHTML
                        .replace("%1", i.name)
                        .replace("%2", i.getDescription(i))
                        .replace("%3", nfmt2(i.cost))
                        .replace("%4", i.lvl);
                    const el = document.createElement("li");
                    el.innerHTML = html;
                    el.className = "item hide";
                    el.addEventListener("click", () => this.buy(i));
                    this.item_container.appendChild(el);
                    i.dyn_element = el;
                }

                this.loadGame();
                this.evaluateItems();
                setInterval(() => this.tick(), 10);
                setInterval(() => this.saveGame(), 5000);
                this.update();
            }

            tick() {
                this.v += this.va / 100;
                this.updateCounter();
                this.updateItems();
                this.frameCounter++;
                if (this.va > 0 && this.frameCounter % 20 === 0) {
                    this.spawnRain();
                }
            }

            updateCounter() {
                this.cc.firstChild.innerText = nfmt2(this.v);
                this.cs.innerHTML = "per second: " + nfmt2(this.va);
            }

            updateItems() {
                let lastVisible = null;
                for (let i of ITEMS) {
                    if (this.v >= i.cost / 2 || i.lvl > 0) {
                        i.dyn_element.classList.remove("hide");
                        lastVisible = i.dyn_element;
                    }
                    if (this.v >= i.cost) {
                        i.dyn_element.classList.add("item_buyable");
                    } else {
                        i.dyn_element.classList.remove("item_buyable");
                    }
                    i.dyn_element.querySelector(".icost").innerText = nfmt2(i.cost);
                    i.dyn_element.querySelector(".ilvl").innerHTML = '<span class="_ilvl">x</span>' + i.lvl;
                }
            }

            evaluateItems() {
                this.va = 0;
                this.multiplier = 1;
                for (let i of ITEMS) {
                    if (i.multiplier) {
                        this.multiplier *= Math.pow(i.multiplier, i.lvl);
                    } else {
                        let val = 0;
                        let currentVal = i.initial_value;
                        for (let l = 0; l < i.lvl; l++) {
                            val += currentVal;
                            currentVal = i.value_func(currentVal);
                        }
                        this.va += val;
                    }
                }
            }

            buy(i) {
                if (this.v < i.cost) return;
                this.v -= i.cost;
                i.lvl++;
                i.cost = i.cost_func(i.cost);
                this.evaluateItems();
                this.update();
            }

            click(e) {
                const add = 1 * this.multiplier;
                this.v += add;
                this.spawnParticle(e ? e.clientX : window.innerWidth / 2, e ? e.clientY : window.innerHeight / 2, "+" + nfmt2(add));
            }

            spawnParticle(x, y, text) {
                const el = document.createElement("div");
                el.className = "particle";
                el.innerText = text;
                el.style.left = x + "px";
                el.style.top = y + "px";
                document.body.appendChild(el);
                
                let ty = y;
                let opacity = 1;
                const anim = setInterval(() => {
                    ty -= 2;
                    opacity -= 0.02;
                    el.style.top = ty + "px";
                    el.style.opacity = opacity;
                    if (opacity <= 0) {
                        clearInterval(anim);
                        el.remove();
                    }
                }, 16);
            }

            spawnRain() {
                const el = document.createElement("div");
                el.className = "spacebar_particle";
                el.style.left = Math.random() * window.innerWidth + "px";
                el.style.top = "-20px";
                document.body.appendChild(el);
                
                let ty = -20;
                const anim = setInterval(() => {
                    ty += 5;
                    el.style.top = ty + "px";
                    if (ty > window.innerHeight) {
                        clearInterval(anim);
                        el.remove();
                    }
                }, 16);
            }

            update() {
                this.updateCounter();
                this.updateItems();
            }

            saveGame() {
                const data = {
                    v: this.v,
                    items: ITEMS.map(i => ({ lvl: i.lvl, cost: i.cost }))
                };
                localStorage.setItem("spacebar_clicker_save", JSON.stringify(data));
            }

            loadGame() {
                const saved = localStorage.getItem("spacebar_clicker_save");
                if (saved) {
                    const data = JSON.parse(saved);
                    this.v = data.v || 0;
                    if (data.items) {
                        data.items.forEach((d, idx) => {
                            if (ITEMS[idx]) {
                                ITEMS[idx].lvl = d.lvl;
                                ITEMS[idx].cost = d.cost;
                            }
                        });
                    }
                }
            }
        }

        const game = new Game();
        game.init();
    </script>
</body>
</html>
